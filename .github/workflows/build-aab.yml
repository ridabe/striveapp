name: Build Android AAB

# Secrets necessários (Settings → Secrets and variables → Actions → New repository secret):
#
#   EXPO_TOKEN                   Token EAS → expo.dev → Account Settings → Access Tokens
#   SUPABASE_URL                 URL do projeto Supabase  (EXPO_PUBLIC_SUPABASE_URL)
#   SUPABASE_ANON_KEY            Chave anon do Supabase   (EXPO_PUBLIC_SUPABASE_ANON_KEY)
#   GOOGLE_PLAY_KEY_BASE64       google-play-key.json (conta de serviço) em base64.
#                                Gere com:  base64 -w0 google-play-key.json   (Linux)
#                                ou:        certutil -encode google-play-key.json tmp && type tmp  (Windows)
#
# O keystore de signing é gerenciado pelo EAS (expo.dev → project → Credentials).
# O build roda localmente no runner do GitHub — sem consumir minutos EAS.
# Após o build, o AAB é enviado automaticamente para a faixa de teste interno
# da Play Store via `eas submit` (track configurado em eas.json → submit.production).

on:
  push:
    branches:
      - main
    paths:
      - 'app.json'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forçar build mesmo sem mudança de versão'
        type: boolean
        default: false
      track:
        description: 'Faixa de publicação na Play (push automático sempre vai para internal)'
        type: choice
        default: internal
        options:
          - internal     # Teste interno
          - closed       # Teste fechado (alpha)
          - beta         # Teste aberto (beta)
          - production   # Produção (entra como RASCUNHO; aprovar manualmente na Play)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Verifica se expo.version ou versionCode realmente mudou ──
  check-version:
    name: Verificar bump de versão
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.diff.outputs.version }}
      version_code: ${{ steps.diff.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Comparar versões
        id: diff
        run: |
          CURRENT_VER=$(jq -r '.expo.version' app.json)
          CURRENT_CODE=$(jq -r '.expo.android.versionCode' app.json)

          PREV_VER=$(git show HEAD~1:app.json 2>/dev/null | jq -r '.expo.version' 2>/dev/null || echo "")
          PREV_CODE=$(git show HEAD~1:app.json 2>/dev/null | jq -r '.expo.android.versionCode' 2>/dev/null || echo "")

          echo "version=$CURRENT_VER"       >> "$GITHUB_OUTPUT"
          echo "version_code=$CURRENT_CODE" >> "$GITHUB_OUTPUT"

          FORCE="${{ github.event.inputs.force }}"

          if [ "$CURRENT_VER" != "$PREV_VER" ] || [ "$CURRENT_CODE" != "$PREV_CODE" ] || [ "$FORCE" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Versão alterada: $PREV_VER ($PREV_CODE) → $CURRENT_VER ($CURRENT_CODE)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Nenhuma mudança de versão detectada. Build ignorado."
          fi

  # ── 2. Build via EAS --local (keystore gerenciado pelo EAS) ──
  build:
    name: Build AAB (EAS local)
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build AAB (production)
        run: eas build --platform android --profile production --local --non-interactive --output ./build/app-release.aab
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload artefato AAB
        uses: actions/upload-artifact@v4
        with:
          name: strive-personal-v${{ needs.check-version.outputs.version }}-vc${{ needs.check-version.outputs.version_code }}
          path: ./build/app-release.aab
          retention-days: 60

      - name: Preparar chave de serviço do Google Play
        run: echo "${{ secrets.GOOGLE_PLAY_KEY_BASE64 }}" | base64 -d > google-play-key.json

      - name: Enviar para Google Play
        # Push automático (sem input) → internal. Disparo manual → faixa escolhida.
        run: eas submit --platform android --profile "${{ github.event.inputs.track || 'internal' }}" --path ./build/app-release.aab --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Remover chave de serviço
        if: always()
        run: rm -f google-play-key.json

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: "v${{ needs.check-version.outputs.version }} (versionCode ${{ needs.check-version.outputs.version_code }})"
          files: ./build/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
